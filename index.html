<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kurukshetra — Pure study hub for JEE 2028">
  
  <!-- Standard favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
  <link rel="shortcut icon" href="assets/icons/favicon-32.png">
  
  <!-- Apple touch icon (iOS PWA) -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="192x192" href="assets/icons/icon-192.png">
  
  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- iOS PWA meta -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kurukshetra">
  <link rel="apple-touch-startup-image" href="assets/icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- Windows tile -->
  <meta name="msapplication-TileImage" content="assets/icons/icon-192.png">
  <meta name="msapplication-TileColor" content="#6366f1">
  
  <!-- Theme color (keep existing) -->
  <meta name="theme-color" content="#6366f1">
  
  <!-- Preconnect to external resources for performance -->
  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="preconnect" href="https://i.ytimg.com">
  <link rel="preconnect" href="https://www.vedantu.com">
  <link rel="preconnect" href="https://ncert.nic.in">
  <link rel="dns-prefetch" href="https://www.examside.com">
  
  <!-- Open Graph for share previews -->
  <meta property="og:title" content="Kurukshetra — JEE 2028 Study Hub">
  <meta property="og:description" content="40 chapters × 9 resource tabs + smart tools for JEE 2028">
  <meta property="og:image" content="assets/icons/icon-512.png">
  <meta property="og:type" content="website">

  <title>Kurukshetra — JEE 2028 Study Hub</title>
  <link rel="stylesheet" href="css/study.css">
</head>
<body class="theme-dark">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <strong>Chapters</strong>
      <button class="icon-btn" id="sidebarClose" title="Close">✕</button>
    </div>
    <nav class="sidebar-nav">
      <button data-nav="home">🏠 Home</button>
      <button data-nav="formulas">📐 Formulas</button>
      <button data-nav="myformulas">⭐ My Formulas</button>
      <button data-nav="textbooks">📘 Textbooks</button>
      <button data-nav="papers">📄 JEE Papers</button>
      <button data-nav="rapid">⚡ Rapid Fire</button>
      <button data-nav="mistakes">❌ Mistakes</button>
      <button data-nav="analytics">📊 Analytics</button>
      <button data-nav="plans">🗓️ Plans</button>
      <button data-nav="bookmarks">🔖 Bookmarks</button>
      <button data-nav="settings">⚙️ Settings</button>
    </nav>
    <div class="sidebar-tree" id="sidebarTree"></div>
  </aside>
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="App.toggleSidebar(false)"></div>

  <header class="study-header">
    <button class="icon-btn" id="menuBtn" title="Menu">☰</button>
    <div class="brand" id="logoBtn"><div class="brand-mark">K</div><div class="brand-name">Kurukshetra</div></div>
    <div class="search-wrap">
      <span class="search-icon-btn">🔍</span>
      <input type="text" id="globalSearch" placeholder="Search chapters, formulas (e.g. u²sin2θ/g)..." autocomplete="off">
      <div id="searchResults" class="hidden"></div>
    </div>
    <div class="font-nudge">
      <button class="icon-btn" id="fontDown" title="Smaller">A−</button>
      <button class="icon-btn" id="fontReset" title="Reset">A</button>
      <button class="icon-btn" id="fontUp" title="Larger">A+</button>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="homeBtn" title="Home (g h)">🏠</button>
      <button class="icon-btn" id="bookmarksBtn" title="Bookmarks (g b)">🔖</button>
      <button class="icon-btn" id="themeToggle" title="Theme">🌓</button>
      <button class="icon-btn" id="settingsBtn" title="Settings (g s)">⚙️</button>
    </div>
  </header>

  <div class="app-shell">
    <main>
      <section id="view-home" class="view">
        <div id="homeHero" class="home-hero"></div>
        <div id="resumeCard"></div>
        <div id="fotdCard"></div>
        <div id="formulaCounts"></div>
        <div id="srsCard"></div>
        <div id="recommendCard"></div>
        <div id="weekStrip"></div>
        <div id="subjectsGrid" class="subjects-grid"></div>
        <div id="recentChapters"></div>
      </section>
      <section id="view-subject" class="view hidden"></section>
      <section id="view-chapter" class="view hidden"></section>
      <section id="view-bookmarks" class="view hidden"></section>
      <section id="view-settings" class="view hidden"></section>
      <section id="view-formulas" class="view hidden"></section>
      <section id="view-my-formulas" class="view hidden"></section>
      <section id="view-textbooks" class="view hidden"></section>
      <section id="view-papers" class="view hidden"></section>
      <section id="view-mistakes" class="view hidden"></section>
      <section id="view-rapid" class="view hidden"></section>
      <section id="view-analytics" class="view hidden"></section>
      <section id="view-plans" class="view hidden"></section>
      <section id="view-resource-health" class="view hidden"></section>
    </main>
  </div>

  <nav class="bottom-nav" id="bottomNav">
    <button data-nav="home">🏠<span>Home</span></button>
    <button data-nav="formulas">📐<span>Formulas</span></button>
    <button data-nav="rapid">⚡<span>Rapid</span></button>
    <button data-nav="mistakes">❌<span>Mistakes</span></button>
    <button data-nav="analytics">📊<span>Stats</span></button>
  </nav>

  <div id="toast" class="hidden"></div>

  <div id="fileModal" class="modal hidden"><div class="modal-box"><div class="modal-head"><h3 id="fileModalTitle">Resource</h3><a id="fileModalLink" href="#" target="_blank" rel="noopener" class="btn btn-primary" style="text-decoration:none; padding: 8px 18px;">Open in new tab ↗</a><button class="modal-close" id="fileModalClose">✕</button></div><div class="modal-body"><div id="fileModalNotice" class="iframe-notice">💡 If the preview is blank, the site doesn't allow embedding. <a id="fileModalNoticeLink" href="#" target="_blank" rel="noopener">Open directly →</a></div><iframe id="fileModalFrame" src="about:blank" loading="lazy" allowfullscreen></iframe></div></div></div>

  <div id="videoModal" class="modal hidden"><div class="modal-box"><div class="modal-head"><h3 id="videoModalTitle">Video</h3><button class="modal-close" id="videoModalClose">✕</button></div><div class="modal-body video-modal-body"><div id="videoModalMeta" class="video-meta"></div><iframe id="videoModalFrame" src="about:blank" loading="lazy" allow="accelerometer; autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe><p id="videoModalDesc"></p></div></div></div>

  <script src="js/data/syllabus.js"></script>
  <script src="js/data/physics.js"></script>

  <script src="js/data/maths.js"></script>
  <script src="js/data/pyq-physics.js"></script>
  <script src="js/data/pyq-physics-full.js"></script>
  <script src="js/data/pyq-chemistry.js"></script>
  <script src="js/data/pyq-maths.js"></script>

  <script src="js/ui/ncert-solutions.js"></script>
  <script src="js/ui/bookmarks.js"></script>
  <script src="js/ui/search.js"></script>

  <script src="js/app.js"></script>
</body>
</html>
