<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kurukshetra — Pure study hub for JEE 2028">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kurukshetra — JEE 2028 Study Hub</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%236366f1'/%3E%3Ctext x='50' y='66' text-anchor='middle' font-family='Arial' font-size='52' font-weight='700' fill='white'%3EK%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/study.css">
</head>
<body class="theme-dark">
  <header class="study-header">
    <div class="brand" id="logoBtn"><div class="brand-mark">K</div><div class="brand-name">Kurukshetra</div></div>
    <div class="search-wrap">
      <span class="search-icon-btn">🔍</span>
      <input type="text" id="globalSearch" placeholder="Search chapters, formulas, videos..." autocomplete="off">
      <div id="searchResults" class="hidden"></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="homeBtn" title="Home">🏠</button>
      <button class="icon-btn" id="bookmarksBtn" title="Bookmarks">🔖</button>
      <button class="icon-btn" id="themeToggle" title="Theme">🌓</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
    </div>
  </header>

  <main>
    <section id="view-home" class="view"><div id="homeHero" class="home-hero"></div><div id="subjectsGrid" class="subjects-grid"></div><div id="recentChapters"></div></section>
    <section id="view-subject" class="view hidden"></section>
    <section id="view-chapter" class="view hidden"></section>
    <section id="view-bookmarks" class="view hidden"></section>
    <section id="view-settings" class="view hidden"></section>
  </main>

  <div id="toast" class="hidden"></div>

  <div id="fileModal" class="modal hidden"><div class="modal-box"><div class="modal-head"><h3 id="fileModalTitle">Resource</h3><a id="fileModalLink" href="#" target="_blank" class="btn btn-ghost">Open in new tab ↗</a><button class="modal-close" id="fileModalClose">✕</button></div><div class="modal-body"><iframe id="fileModalFrame" src="about:blank" allowfullscreen></iframe></div></div></div>

  <div id="videoModal" class="modal hidden"><div class="modal-box"><div class="modal-head"><h3 id="videoModalTitle">Video</h3><button class="modal-close" id="videoModalClose">✕</button></div><div class="modal-body video-modal-body"><div id="videoModalMeta" class="video-meta"></div><iframe id="videoModalFrame" src="about:blank" allow="accelerometer; autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe><p id="videoModalDesc"></p></div></div></div>

  <script src="js/data/syllabus.js"></script>
  <script src="js/data/physics.js"></script>
  <script src="js/data/chemistry.js"></script>
  <script src="js/data/maths.js"></script>
  <script src="js/data/pyq-physics.js"></script>
  <script src="js/data/pyq-physics-full.js"></script>
  <script src="js/data/pyq-chemistry.js"></script>
  <script src="js/data/pyq-maths.js"></script>
  <script src="js/data/curated-bank.js"></script>
  <script src="js/data/study-content.js"></script>
  <script src="js/data/best-videos.js"></script>
  <script src="js/data/best-resources.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/storage/save.js"></script>
  <script src="js/ui/file-viewer.js"></script>
  <script src="js/ui/video-player.js"></script>
  <script src="js/ui/notes.js"></script>
  <script src="js/ui/mindmap.js"></script>
  <script src="js/ui/cheatsheet.js"></script>
  <script src="js/ui/summary.js"></script>
  <script src="js/ui/topper-notes.js"></script>
  <script src="js/ui/resources.js"></script>
  <script src="js/ui/pyqs.js"></script>
  <script src="js/ui/bookmarks.js"></script>
  <script src="js/ui/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
